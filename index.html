          ${ICONS.home} ホーム
        </button>
        <button class="mobile-nav-item active">
          ${ICONS.user} プロフィール
        </button>
        ${state.token ? `<button class="mobile-nav-post" onclick="openPostModal()">${ICONS.plus}</button>` : ''}
        ${state.token ? `<button class="mobile-nav-item" onclick="doLogout()">${ICONS.logout} ログアウト</button>` : ''}
        <button class="mobile-nav-item" onclick="toggleTheme()">${themeIcon()} テーマ</button>
      </div>
    </div>
  `;

            try {
                const profileRes = await api({ action: 'getUserProfile', username });
                const headerEl = document.getElementById('profileHeader');
                if (!profileRes.success) {
                    headerEl.innerHTML = `<p style="color:var(--danger)">${esc(profileRes.error)}</p>`;
                    return;
                }
                const u = profileRes;
                const joinDate = u.createdAt ? new Date(u.createdAt).toLocaleDateString('ja-JP') : '';

                headerEl.innerHTML = `
      ${avatarHtml(u.iconBase64, u.username, 'lg')}
      <div>
        <div class="user-profile-name">${esc(u.username)}</div>
        <div class="user-profile-handle">@${esc(u.username)}</div>
      </div>
      ${u.bio ? `<div class="user-profile-bio">${esc(u.bio)}</div>` : '<div class="user-profile-bio" style="color:var(--text-muted)">自己紹介なし</div>'}
      ${joinDate ? `<div class="user-profile-meta">${ICONS.calendar} ${joinDate} からゲコっている</div>` : ''}
      <div class="user-profile-actions">
        ${isMe ? `<button class="btn btn-primary btn-sm" onclick="render('profile-edit')">${ICONS.edit} プロフィールを編集</button>` : ''}
        <button class="btn btn-secondary btn-sm" onclick="backToTimeline()">${ICONS.arrowLeft} タイムラインへ</button>
      </div>
    `;

                const postsRes = await api({ action: 'getUserPosts', username, token: state.token || '' });
                const postsSection = document.getElementById('userPostsSection');
                if (!postsRes.success) {
                    postsSection.innerHTML = `<p style="color:var(--danger);text-align:center">${esc(postsRes.error)}</p>`;
                    return;
                }

                if (postsRes.posts.length === 0) {
                    postsSection.innerHTML = `
        <div class="empty-state">
          <div class="empty-state-icon">🐸</div>
          <p>まだ投稿がありません</p>
        </div>`;
                } else {
                    postsSection.innerHTML = postsRes.posts.map(p => userPagePostCardHtml(p)).join('');
                }

                if (postsRes.hasMore) {
                    postsSection.insertAdjacentHTML('beforeend', `
        <div class="load-more-wrap">
          <button class="btn btn-secondary" onclick="loadMoreUserPosts('${esc(username)}', ${postsRes.posts.length})">もっと見る</button>
        </div>
      `);
                }

            } catch (e) {
                document.getElementById('profileHeader').innerHTML = '<p style="color:var(--danger)">読み込みに失敗しました</p>';
                console.error(e);
            }
        }

        function userPagePostCardHtml(p) {
            const quoteBlock = (p.isQuote && p.quotedPost)
                ? `<div class="quote-block">
        <div class="quote-block-header">
          <span class="quote-block-username" onclick="navigateToUser('${esc(p.quotedPost.username)}')">@${esc(p.quotedPost.username)}</span>
          <span style="color:var(--text-muted)">${formatTime(p.quotedPost.createdAt)}</span>
        </div>
        <div class="quote-block-content">${esc(p.quotedPost.content)}</div>
      </div>`
                : (p.isQuote ? `<div class="quote-block" style="color:var(--text-muted);font-size:12px">（引用元は削除済み）</div>` : '');

            const likeClass = p.likedByMe ? 'action-btn liked' : 'action-btn';
            const likeIcon = p.likedByMe ? ICONS.heartFill : ICONS.heart;
            const myBtns = (p.isMyPost && !p.isRepost)
                ? `<button class="action-btn" onclick="openEditModalFromUserPage('${esc(p.postId)}')" title="編集" style="color:var(--text-muted)">${ICONS.edit}</button><button class="action-btn" onclick="deletePostFromUserPage('${esc(p.postId)}')" title="削除" style="color:var(--text-muted)">${ICONS.trash}</button>`
                : (p.isMyPost ? `<button class="action-btn" onclick="deletePostFromUserPage('${esc(p.postId)}')" title="削除" style="color:var(--text-muted)">${ICONS.trash}</button>` : '');

            // 200文字以上は折りたたむ
            const isLong = (p.content || '').length > 200;
            const contentHtml = isLong
                ? `<div class="post-content post-content-collapsed" id="content-u${esc(p.postId)}">${esc(p.content)}</div><button class="expand-btn" id="expand-u${esc(p.postId)}" onclick="toggleExpandU('${esc(p.postId)}')">続きを表示 ▾</button>`
                : `<div class="post-content">${esc(p.content)}</div>`;

            return `
    <div class="post-card" id="upost-${esc(p.postId)}">
      <div class="post-body">
        <div class="post-header">
          <span class="post-time">${formatTime(p.createdAt)}</span>
          ${p.isQuote ? `<span style="font-size:11px;color:var(--quote-color);display:flex;align-items:center;gap:4px;width:37px;">${ICONS.quote} 引用再ゲコ</span>` : ''}
          ${p.isEdited ? '<span style="font-size:11px;color:var(--text-muted)">(編集済み)</span>' : ''}
        </div>
        ${contentHtml}
        ${quoteBlock}
        <div class="post-actions">
          <button class="${likeClass}" onclick="toggleLikeOnUserPage('${esc(p.postId)}', this)">
            ${likeIcon} <span class="count">${p.likeCount || 0}</span>
          </button>
          ${state.token ? `<button class="action-btn" onclick="openQuoteModal('${esc(p.postId)}')">${ICONS.quote}</button>` : ''}
          <div style="margin-left:auto;display:flex;gap:2px">${myBtns}</div>
        </div>
      </div>
    </div>
  `;
        }

        function toggleExpandU(postId) {
            const contentEl = document.getElementById('content-u' + postId);
            const btnEl = document.getElementById('expand-u' + postId);
            if (!contentEl || !btnEl) return;
            const collapsed = contentEl.classList.contains('post-content-collapsed');
            if (collapsed) {
                contentEl.classList.remove('post-content-collapsed');
                btnEl.textContent = '折りたたむ ▴';
            } else {
                contentEl.classList.add('post-content-collapsed');
                btnEl.textContent = '続きを表示 ▾';
            }
        }

        function openEditModalFromUserPage(postId) {
            if (!state.token) { showToast('ログインが必要です', 'error'); return; }
            // ユーザーページ上の投稿をDOMから読み取り仮オブジェクト生成
            const cardEl = document.getElementById('upost-' + postId);
            if (!cardEl) return;
            const contentEl = cardEl.querySelector('.post-content');
            const post = {
                postId,
                username: state.username,
                content: contentEl ? contentEl.textContent : '',
            };
            state.editingPost = post;

            const avatarEl = document.getElementById('editModalAvatar');
            if (avatarEl) avatarEl.innerHTML = avatarHtml(state.iconBase64, state.username);

            const textarea = document.getElementById('editContent');
            if (textarea) textarea.value = post.content;
            updateEditCharCount();

            document.getElementById('editModal').classList.add('open');
            textarea?.focus();
        }

        async function toggleLikeOnUserPage(postId, btn) {
            if (!state.token) { showToast('ログインが必要です', 'error'); return; }
            try {
                const res = await api({ action: 'like', token: state.token, postId });
                if (res.success) {
                    const countEl = btn.querySelector('.count');
                    const cur = parseInt(countEl.textContent) || 0;
                    if (res.liked) {
                        btn.classList.add('liked');
                        btn.innerHTML = `${ICONS.heartFill} <span class="count">${cur + 1}</span>`;
                    } else {
                        btn.classList.remove('liked');
                        btn.innerHTML = `${ICONS.heart} <span class="count">${Math.max(0, cur - 1)}</span>`;
                    }
                } else { showToast(res.error, 'error'); }
            } catch { showToast('サーバーエラー', 'error'); }
        }

        async function deletePostFromUserPage(postId) {
            if (!confirm('この投稿を削除しますか？')) return;
            try {
                const res = await api({ action: 'deletePost', token: state.token, postId });
                if (res.success) {
                    const el = document.getElementById('upost-' + postId);
                    if (el) { el.style.opacity = '0'; el.style.transition = 'opacity 0.2s'; setTimeout(() => el.remove(), 200); }
                    showToast('削除しました', 'success');
                } else { showToast(res.error, 'error'); }
            } catch { showToast('サーバーエラー', 'error'); }
        }

        async function loadMoreUserPosts(username, offset) {
            const btn = event.target;
            btn.disabled = true; btn.innerHTML = '<span class="loading-spinner"></span>';
            try {
                const res = await api({ action: 'getUserPosts', username, token: state.token || '', offset });
                if (res.success) {
                    const wrap = btn.closest('.load-more-wrap');
                    res.posts.forEach(p => wrap.insertAdjacentHTML('beforebegin', userPagePostCardHtml(p)));
                    if (res.hasMore) {
                        btn.disabled = false; btn.textContent = 'もっと見る';
                        btn.setAttribute('onclick', `loadMoreUserPosts('${esc(username)}', ${offset + res.posts.length})`);
                    } else {
                        wrap.remove();
                    }
                }
            } catch { showToast('読み込みに失敗しました', 'error'); btn.disabled = false; btn.textContent = 'もっと見る'; }
        }

        // ============================================================
        // プロフィール編集ページ
        // ============================================================
        async function renderProfileEditPage(updateUrl = true) {
            state.page = 'profile-edit';
            clearAutoRefresh();
            if (updateUrl) pushUrl('profile-edit');

            document.getElementById('app').innerHTML = `
    <div class="app-layout">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div class="sidebar-logo" onclick="backToTimeline()">
            <div style="width:28px;height:28px">${ICONS.frog}</div>
            ゲコランド
          </div>
        </div>
        <nav class="sidebar-nav">
          <button class="sidebar-nav-item" onclick="backToTimeline()">
            ${ICONS.home} ホーム
          </button>
          <button class="sidebar-nav-item active" onclick="navigateToUser('${esc(state.username)}')">
            ${ICONS.user} プロフィール
          </button>
          <button class="sidebar-nav-item" onclick="doLogout()">
            ${ICONS.logout} ログアウト
          </button>
        </nav>
        <button class="sidebar-post-btn" onclick="openPostModal()">
          ${ICONS.plus} ゲコる
        </button>
        <div class="sidebar-user" onclick="navigateToUser('${esc(state.username)}')">
          ${avatarHtml(state.iconBase64, state.username)}
          <div class="sidebar-user-info">
            <div class="sidebar-user-name">${esc(state.username)}</div>
            <div class="sidebar-user-handle">@${esc(state.username)}</div>
          </div>
          <button class="theme-btn" onclick="event.stopPropagation();toggleTheme()">${themeIcon()}</button>
        </div>
      </aside>

      <div class="main-area">
        <div class="mobile-topbar">
          <div class="mobile-topbar-logo" onclick="backToTimeline()">
            <div style="width:26px;height:26px">${ICONS.frog}</div>
            ゲコランド
          </div>
          <div class="mobile-topbar-actions">
            <button class="theme-btn" onclick="toggleTheme()">${themeIcon()}</button>
          </div>
        </div>

        <div class="main-content">
          <div class="feed-header" style="display:flex;align-items:center;gap:10px">
            <button class="btn btn-ghost btn-sm" onclick="navigateToUser('${esc(state.username)}')" style="padding:6px">
              ${ICONS.arrowLeft}
            </button>
            <div class="feed-header-title">プロフィールを編集</div>
          </div>

          <div style="background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px" class="profile-page" id="profileCard">
            <div class="profile-icon-wrap">
              <div style="position:relative">
                <div id="profileIconPreview">${avatarHtml(state.iconBase64, state.username, 'lg')}</div>
              </div>
              <label class="btn btn-secondary btn-sm icon-upload-btn">
                ${ICONS.camera} アイコンを変更
                <input type="file" accept="image/*" onchange="handleIconUpload(event)">
              </label>
              <span style="font-size:11px;color:var(--text-muted)">最大500KB・自動リサイズ</span>
            </div>
            <div class="form-group">
              <label class="form-label">ユーザー名</label>
              <input class="input-field" type="text" value="@${esc(state.username)}" disabled style="opacity:0.5">
            </div>
            <div class="form-group">
              <label class="form-label">自己紹介（200文字以内）</label>
              <textarea class="input-field" id="bioInput" rows="4" maxlength="200" placeholder="自己紹介を入力..." style="resize:none">${esc(state.bio)}</textarea>
            </div>
            <div id="profileError" class="form-error" style="display:none">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:14px;height:14px;flex-shrink:0"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
              <span></span>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;margin-top:4px">
              <button class="btn btn-primary" onclick="saveProfile()">保存する</button>
              <button class="btn btn-secondary" onclick="navigateToUser('${esc(state.username)}')">${ICONS.arrowLeft} プロフィールに戻る</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  `;

            try {
                const res = await api({ action: 'getProfile', token: state.token });
                if (res.success) {
                    state.bio = res.bio;
                    const bioInput = document.getElementById('bioInput');
                    if (bioInput) bioInput.value = res.bio;
                    if (res.iconBase64) {
                        state.iconBase64 = res.iconBase64;
                        localStorage.setItem('geko_icon', res.iconBase64);
                        const prev = document.getElementById('profileIconPreview');
                        if (prev) prev.innerHTML = avatarHtml(res.iconBase64, state.username, 'lg');
                    }
                }
            } catch { }
        }

        let pendingIcon = null;

        function handleIconUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            if (!file.type.startsWith('image/')) { showToast('画像ファイルを選択してください', 'error'); return; }
            const reader = new FileReader();
            reader.onload = (ev) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const SIZE = 96;
                    canvas.width = SIZE; canvas.height = SIZE;
                    const ctx = canvas.getContext('2d');
                    const scale = Math.max(SIZE / img.width, SIZE / img.height);
                    const sw = SIZE / scale, sh = SIZE / scale;
                    const sx = (img.width - sw) / 2, sy = (img.height - sh) / 2;
                    ctx.drawImage(img, sx, sy, sw, sh, 0, 0, SIZE, SIZE);
                    const b64 = canvas.toDataURL('image/jpeg', 0.6);
                    if (b64.length > 20000) { showToast('画像が大きすぎます。別の画像を試してください', 'error'); return; }
                    pendingIcon = b64;
                    const prev = document.getElementById('profileIconPreview');
                    if (prev) prev.innerHTML = `<img class="avatar avatar-lg" src="${b64}" alt="プレビュー">`;
                };
                img.src = ev.target.result;
            };
            reader.readAsDataURL(file);
        }

        async function saveProfile() {
            const bio = document.getElementById('bioInput')?.value || '';
            const errEl = document.getElementById('profileError');
            if (errEl) { errEl.style.display = 'none'; }

            const saveBtn = document.querySelector('.profile-page .btn-primary');
            const origLabel = '保存する';
            if (saveBtn) { saveBtn.disabled = true; saveBtn.innerHTML = '<span class="loading-spinner"></span> 保存中…'; }
            let succeeded = false;
            try {
                const bioRes = await api({ action: 'updateProfile', token: state.token, bio });
                if (!bioRes.success) {
                    if (errEl) { errEl.querySelector('span').textContent = bioRes.error; errEl.style.display = 'flex'; }
                    return;
                }
                state.bio = bio;
                if (pendingIcon) {
                    const iconRes = await api({ action: 'updateProfile', token: state.token, bio: '', iconBase64: pendingIcon });
                    if (!iconRes.success) {
                        if (errEl) { errEl.querySelector('span').textContent = iconRes.error; errEl.style.display = 'flex'; }
                        return;
                    }
                    state.iconBase64 = pendingIcon;
                    localStorage.setItem('geko_icon', pendingIcon);
                    pendingIcon = null;
                }
                succeeded = true;
                if (saveBtn) {
                    saveBtn.innerHTML = '✅ 変更しました！';
                    saveBtn.style.background = '#4ade80';
                    saveBtn.style.color = '#0f1a12';
                }
                showToast('プロフィールを変更しました', 'success');
            } catch {
                if (errEl) { errEl.querySelector('span').textContent = 'サーバーエラーが発生しました'; errEl.style.display = 'flex'; }
            } finally {
                if (succeeded) {
                    setTimeout(() => {
                        if (saveBtn) { saveBtn.innerHTML = origLabel; saveBtn.style.background = ''; saveBtn.style.color = ''; saveBtn.disabled = false; }
                    }, 2000);
                } else {
                    if (saveBtn) { saveBtn.disabled = false; saveBtn.innerHTML = origLabel; saveBtn.style.background = ''; saveBtn.style.color = ''; }
                }
            }
        }

        // ============================================================
        // 起動処理
        // ============================================================
        async function init() {
            initTheme();

            if (state.token) {
                try {
                    const res = await api({ action: 'checkToken', token: state.token });
                    if (res.success) {
                        state.username = res.username;
                        state.iconBase64 = res.iconBase64 || state.iconBase64;
                        state.bio = res.bio || '';
                        localStorage.setItem('geko_username', res.username);
                        const { page, user } = getUrlParams();
                        if (page || user) {
                            await dispatchPage(page, user);
                        } else {
                            await renderTimeline(false); // renderTimeline内で非同期にloadTimeline
                        }
                        return;
                    }
                } catch { }
                clearSession();
            }

            const { page, user } = getUrlParams();
            if (page === 'login') { render('login', false); return; }
            if (page === 'register') { render('register', false); return; }
            if (page === 'user' && user) { await renderUserProfilePage(user, false); return; }

            render('landing', false);
        }

        init();
    </script>
</body>

</html>
